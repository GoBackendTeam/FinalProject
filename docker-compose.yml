services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: regs
      POSTGRES_PASSWORD: regs
      POSTGRES_DB: regs
    # 用 5433 避開主機既有的原生 PostgreSQL(常佔 5432)。
    ports:
      - "5433:5432"
    volumes:
      - regs-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regs"]
      interval: 5s
      timeout: 3s
      retries: 10

  # app 容器化(DooD):掛 docker.sock,並用 *_HOST 讓 judge bind mount 指向主機路徑。
  # 開發時也可在主機直接 `make run`,不必啟動此服務。
  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://regs:regs@db:5432/regs?sslmode=disable
      PROBLEMS_ROOT: /app/problems
      PROBLEMS_ROOT_HOST: ${PWD}/problems
      JUDGE_WORKSPACE: /workspace
      JUDGE_WORKSPACE_HOST: ${PWD}/workspace
      JUDGE_PLATFORM: linux/amd64
      JWT_PRIVATE_KEY_PATH: /app/keys/private.pem
      JWT_PUBLIC_KEY_PATH: /app/keys/public.pem
      GIN_MODE: debug
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PWD}/workspace:/workspace
      - ${PWD}/problems:/app/problems
      - ${PWD}/keys:/app/keys:ro

volumes:
  regs-pgdata:
